security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            id: App\Security\UserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\CodeAuthenticator
            logout:
                path: /api/auth/logout
            entry_point: App\Security\CodeAuthenticator

    access_control:
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/logout, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/check, roles: PUBLIC_ACCESS }
        - { path: ^/api/music/stream, roles: PUBLIC_ACCESS }
        - { path: ^/api/music/playlist, roles: PUBLIC_ACCESS }
        - { path: ^/api/music, roles: PUBLIC_ACCESS }
        - { path: ^/api/devices, roles: PUBLIC_ACCESS }
        - { path: ^/api/notifications, roles: PUBLIC_ACCESS }
        - { path: ^/api/feed, roles: PUBLIC_ACCESS }
        - { path: ^/api/chat, roles: PUBLIC_ACCESS }
        - { path: ^/api/tasks, roles: PUBLIC_ACCESS }
        - { path: ^/api/academia, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
