services:
  mercure:
    image: dunglas/mercure:latest
    ports:
      - "3000:3000"
    environment:
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-dev-secret-change-in-production}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-dev-secret-change-in-production}
      SERVER_NAME: ':3000'
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://192.168.1.2:8000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
